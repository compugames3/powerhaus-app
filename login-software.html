<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Licencia - COMPUGAMES</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #0d121c;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(13, 18, 28, 0.75); /* Oscurece un poco el video para que resalte la tarjeta */
            z-index: 1;
        }

        body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(250, 86, 85, 0.15) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        .login-card {
            background-color: #151a23;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid #FA5655;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 2;
        }

        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .shield-icon-container {
            width: 50px;
            height: 50px;
            background-color: rgba(250, 86, 85, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .card-header p {
            font-size: 0.85rem;
            color: #8892b0;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ccd6f6;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
        }

        .input-wrapper input {
            width: 100%;
            background-color: #0f131a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 14px 15px 14px 45px;
            color: white;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #FA5655;
            box-shadow: 0 0 0 3px rgba(250, 86, 85, 0.2);
        }

        .submit-btn {
            width: 100%;
            background-color: #FA5655;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 0.95rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #ff3b3a;
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        #login-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .msg-error {
            background-color: rgba(250, 86, 85, 0.1);
            color: #FA5655;
            border: 1px solid rgba(250, 86, 85, 0.3);
        }

        .msg-success {
            background-color: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>

    <!-- Fondo de Video -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="coffe.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="login-card">
        <div class="card-header">
            <div class="shield-icon-container">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#FA5655" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M9 12l2 2 4-4" stroke="#FA5655" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </div>
            <h2>VALIDACIÓN DE SISTEMA</h2>
            <p>Introduce tu correo y el serial de tu licencia para activar el programa.</p>
        </div>

        <form id="software-login-form">
            <div class="form-group">
                <label>CORREO ELECTRÓNICO</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18">
                        <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                    <input type="email" id="email-input" placeholder="usuario@ejemplo.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>SERIAL DE LICENCIA</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="#888" stroke-width="2" fill="none"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#888" stroke-width="2" fill="none" stroke-linecap="round"></path>
                    </svg>
                    <input type="text" id="serial-input" placeholder="XXXX-XXXX-XXXX-XXXX" required style="text-transform: uppercase;">
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                VALIDAR LICENCIA
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <polyline points="9 18 15 12 9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </button>

            <div id="login-message"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('software-login-form');
        const emailInput = document.getElementById('email-input');
        const serialInput = document.getElementById('serial-input');
        const btn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('login-message');

        // Función básica para detectar SO y resolución
        function getPCSpecs() {
            const ua = navigator.userAgent;
            let os = "Desconocido";
            if (ua.indexOf("Win") != -1) os = "Windows";
            if (ua.indexOf("Mac") != -1) os = "MacOS";
            if (ua.indexOf("Linux") != -1) os = "Linux";
            if (ua.indexOf("Android") != -1) os = "Android";
            if (ua.indexOf("like Mac") != -1) os = "iOS";
            
            return {
                os: os,
                resolution: `${window.screen.width}x${window.screen.height}`,
                browser: navigator.appName,
                userAgent: ua
            };
        }

        // Formato automático de guiones para el serial
        serialInput.addEventListener('input', function(e) {
            let val = e.target.value.replace(/-/g, '').toUpperCase();
            if (val.length > 16) val = val.substring(0, 16);
            let formatted = '';
            for (let i = 0; i < val.length; i++) {
                if (i > 0 && i % 4 === 0) formatted += '-';
                formatted += val[i];
            }
            e.target.value = formatted;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const serial = serialInput.value.trim();

            if (serial.length !== 19) { // 16 letras + 3 guiones
                showMessage("El serial debe tener el formato XXXX-XXXX-XXXX-XXXX", "error");
                return;
            }

            btn.textContent = 'VERIFICANDO...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
            messageDiv.style.display = 'none';

            try {
                // Obtener datos de IP y País (Usando un servicio gratuito)
                let ipData = null;
                try {
                    const ipRes = await fetch('https://ipapi.co/json/');
                    if (ipRes.ok) {
                        const ipJson = await ipRes.json();
                        ipData = {
                            ip: ipJson.ip,
                            country: ipJson.country_name,
                            country_code: ipJson.country_code
                        };
                    }
                } catch(e) {
                    console.log("No se pudo obtener la IP");
                }

                const pcSpecs = getPCSpecs();

                // URL de tu dominio oficial en producción
                // const API_URL = 'https://compusprogramas.com/api/verify-serial';
                
                // URL dinámica (funciona en local y en producción)
                const API_URL = '/api/license/validate';

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, licenseKey: serial })
                });

                const data = await response.json();

                if (data.ok) {
                    showMessage(`¡Bienvenido! Licencia válida.`, "success");
                    btn.style.backgroundColor = '#4caf50';
                    btn.innerHTML = 'ACCESO CONCEDIDO <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>';
                    
                    setTimeout(() => {
                        window.location.href = 'compugames://login-success';
                    }, 1000);
                } else {
                    showMessage(data.message, "error");
                    resetBtn();
                }
            } catch (error) {
                showMessage("Error de conexión al servidor de licencias.", "error");
                resetBtn();
            }
        });

        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.className = type === 'error' ? 'msg-error' : 'msg-success';
            messageDiv.style.display = 'block';
        }

        function resetBtn() {
            btn.innerHTML = 'VALIDAR LICENCIA <svg viewBox="0 0 24 24" width="18" height="18"><polyline points="9 18 15 12 9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>';
            btn.style.opacity = '1';
            btn.disabled = false;
        }
    </script>
</body>
</html>
