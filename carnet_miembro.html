<script>
let currentMemberPhone = '';
let currentMemberEmail = '';

function normalizeText(v) {
    return String(v || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function formatDate(dateInput) {
    const d = new Date(dateInput);
    if (isNaN(d.getTime())) return '--/--/----';
    return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
}

function addMonths(dateInput, months) {
    const d = new Date(dateInput);
    if (isNaN(d.getTime())) return null;
    d.setMonth(d.getMonth() + months);
    return d;
}

function getJoinDate(user) {
    if (user?.createdAt) return new Date(user.createdAt);
    if (user?.id) {
        const byId = new Date(user.id);
        if (!isNaN(byId.getTime())) return byId;
    }
    return new Date();
}

async function loadMemberCarnet() {
    const params = new URLSearchParams(window.location.search);
    const nombre = (params.get('nombre') || '').trim();
    const id = (params.get('id') || '').trim();
    const email = (params.get('email') || '').trim();

    let users = [];
    try {
        const req = await fetch('/api/users?t=' + Date.now(), { cache: 'no-store' });
        if (req.ok) {
            users = await req.json();
        }
    } catch(e) {
        console.warn("API no disponible, usando fallback local", e);
    }

    let user = null;
    if (users && users.length > 0) {
        user = users.find(u => normalizeText(u.name) === normalizeText(nombre));
        if (!user && id) user = users.find(u => String(u.id || '') === id);
        if (!user && email) user = users.find(u => normalizeText(u.email) === normalizeText(email));
    }

    if (!user) {
        user = {
            name: nombre || 'Miembro VIP',
            id: id || '0000',
            email: email || 'usuario@powerhaus.com',
            phone: '+00 00000000',
            plan: 'Membresía Activa',
            barcode: 'PHVIP001'
        };
    }

    const savedColor = localStorage.getItem('carnet_preset_color');
    if (savedColor) {
        setCardColor(savedColor);
    }

    const memberName = String(user.name || nombre || 'Miembro');
    const memberPlan = String(user.plan || (user.role && user.role !== 'Member' ? 'Acceso VIP' : 'Membresía Activa'));
    const memberId = String(user.id || user.email || 'PH-0000').replace(/[^0-9A-Za-z.-]/g, '').slice(0, 16);
    const memberEmail = String(user.email || 'Sin correo');
    const memberPhone = String(user.phone || user.telefono || user.cel || user.celular || 'Sin teléfono');
    
    currentMemberPhone = String(user.phone || user.telefono || user.cel || user.celular || '').replace(/[^0-9\+]/g, '');
    currentMemberEmail = memberEmail;

    const joinDate = getJoinDate(user);
    const expireDate = addMonths(joinDate, 1);
    const isActive = String(user.state || 'Active').toLowerCase() !== 'inactive';

    let roleBase = 'MIEMBRO';
    let rawRole = String(user.role || '').toLowerCase();
    if (rawRole === 'admin') roleBase = 'ADMINISTRADOR';
    else if (rawRole === 'staff') roleBase = 'STAFF';
    else if (rawRole === 'trainer' || rawRole === 'entrenador') roleBase = 'ENTRENADOR';

    document.getElementById('cardName').textContent = memberName;
    document.getElementById('cardRole').textContent = roleBase + (isActive ? ' ACTIVO' : ' INACTIVO');
    document.getElementById('cardId').textContent = memberId;
    document.getElementById('cardPlan').textContent = memberPlan.toUpperCase();
    document.getElementById('cardStatus').textContent = isActive ? 'Digitalmente Activo' : 'Digitalmente Inactivo';

    const photo = document.getElementById('cardPhoto');
    const fallback = document.getElementById('cardPhotoFallback');
    fallback.textContent = memberName.charAt(0).toUpperCase();

    if (user.photo) {
        photo.src = user.photo;
        photo.classList.remove('hidden');
        fallback.classList.add('hidden');
    } else {
        photo.classList.add('hidden');
        fallback.classList.remove('hidden');
    }

    const barcodeEl = document.getElementById('cardBarcode');
    if (barcodeEl) {
        const barcodeSource = String(user.barcode || user.phone || (user.email ? user.email.split('@')[0] : 'PH001')).substring(0, 15);
        JsBarcode('#cardBarcode', barcodeSource, {
            format: 'CODE128',
            width: 2,
            height: 60,
            displayValue: true,
            fontSize: 12,
            margin: 0,
            background: '#ffffff',
            lineColor: '#000000'
        });
    }
}

function compartirPorWhatsApp() {
    const savedTitle = (localStorage.getItem('powerhaus_brand_title') || 'PowerHaus').trim();
    const currentUrl = window.location.href;
    const textStr = `¡Hola! Bienvenidos a ${savedTitle}.`;
    const text = encodeURIComponent(textStr);
    
    let url = 'https://web.whatsapp.com/send?text=' + text;
    if (currentMemberPhone && currentMemberPhone.length >= 8) {
        url = 'https://web.whatsapp.com/send?phone=' + currentMemberPhone + '&text=' + text;
    }
    
    window.open(url, '_blank');
}

function compartirPorGmail() {
    const savedTitle = (localStorage.getItem('powerhaus_brand_title') || 'PowerHaus').trim();
    const currentUrl = window.location.href;
    const subject = encodeURIComponent(`Carnet de Miembro - ${savedTitle}`);
    const bodyStr = `¡Hola! Bienvenidos a ${savedTitle}.`;
    const body = encodeURIComponent(bodyStr);
    
    let url = `https://mail.google.com/mail/?view=cm&fs=1&su=${subject}&body=${body}`;
    if (currentMemberEmail && currentMemberEmail !== 'Sin correo') {
        url += `&to=${encodeURIComponent(currentMemberEmail)}`;
    }
    window.open(url, '_blank');
}

function cerrarCarnet() {
    window.location.href = 'gestion de miembros.html';
}

function abrirEditorColor() {
    const saved = localStorage.getItem('carnet_preset_color') || '#facc15';
    const pickerEl = document.getElementById('customColorInput');
    if (pickerEl) pickerEl.value = saved;
    document.getElementById('colorPickerOverlay').classList.add('active');
}

function cerrarColorPicker() {
    document.getElementById('colorPickerOverlay').classList.remove('active');
}

function setCardColor(hexColor) {
    document.querySelectorAll('.bg-dyn').forEach(el => el.style.backgroundColor = hexColor);
    document.querySelectorAll('.text-dyn').forEach(el => el.style.color = hexColor);
    document.querySelectorAll('.border-dyn').forEach(el => el.style.borderColor = hexColor);
    localStorage.setItem('carnet_preset_color', hexColor);
    const pickerEl = document.getElementById('customColorInput');
    if (pickerEl) pickerEl.value = hexColor;
}

async function descargarCarnetJPG(elementId, filenamePrefix) {
    const targetId = elementId === 'carnetScreenshotBox' ? 'carnetArea' : elementId;
    const element = document.getElementById(targetId);
    if (!element) return;

    element.scrollIntoView({ behavior: 'instant', block: 'center' });
    await new Promise(r => setTimeout(r, 150));

    try {
        const canvas = await html2canvas(element, {
            scale: 3,
            backgroundColor: '#0f172a',
            useCORS: true,
            allowTaint: true,
            logging: false,
            ignoreElements: el => el.id === 'colorPickerOverlay'
        });

        const nameEl = document.getElementById('cardName');
        const memberName = nameEl
            ? nameEl.textContent.trim().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\-]/g, '')
            : 'Miembro';

        const filename = `${filenamePrefix}_${memberName || 'Miembro'}.jpg`;

        canvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 'image/jpeg', 0.95);
    } catch (error) {
        console.error('Error al generar JPG:', error);
        alert('No se pudo descargar el carnet como imagen.');
    }
}

function applyBrandIdentityCarnet() {
    const savedTitle = (localStorage.getItem('powerhaus_brand_title') || 'PowerHaus').trim();
    const savedSubtitle = (localStorage.getItem('powerhaus_brand_subtitle') || 'ELITE PERFORMANCE').trim();

    const headerTitle = document.getElementById('brandHeaderTitle');
    const cardTitle = document.getElementById('cardBrandTitle');
    const cardSubtitle = document.getElementById('cardBrandSubtitle');

    if (headerTitle) headerTitle.textContent = savedTitle;
    if (cardTitle) cardTitle.textContent = savedTitle.toUpperCase();
    if (cardSubtitle) cardSubtitle.textContent = savedSubtitle.toUpperCase();

    document.title = `Carnet de Miembro | ${savedTitle}`;
}

applyBrandIdentityCarnet();
window.addEventListener('DOMContentLoaded', loadMemberCarnet);
